<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meshminds3d — Outreach Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --or:#FF6B00;--bk:#111;--wh:#fff;
  --g1:#F4F4F4;--g2:#E6E6E6;--g3:#C8C8C8;--g5:#999;--g7:#444;
  --green:#22c55e;--red:#ef4444;
  --top-h:52px;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--g1);color:var(--bk);}

/* TOPBAR */
#tb{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:#fff;border-bottom:1px solid var(--g2);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.logo{font-family:'Bebas Neue';font-size:19px;letter-spacing:2px;color:var(--or);}
.logo-sub{font-size:11px;color:var(--g5);font-weight:600;}
.tsep{width:1px;height:20px;background:var(--g2);}
.sp{flex:1;}
.xb{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;background:var(--or);color:#fff;}
.xb:hover{background:#e55f00;transform:translateY(-1px);box-shadow:0 3px 10px rgba(255,107,0,.25);}
.xb:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}
.xb.ghost{background:transparent;color:var(--g7);border:1.5px solid var(--g2);}
.xb.ghost:hover{border-color:var(--or);color:var(--or);box-shadow:none;transform:none;}
.xb.sm{padding:5px 10px;font-size:11px;}

/* LAYOUT */
#app{position:fixed;top:var(--top-h);left:0;right:0;bottom:0;display:flex;}

/* SIDEBAR */
#sidebar{width:230px;flex-shrink:0;background:#fff;border-right:1px solid var(--g2);display:flex;flex-direction:column;overflow:hidden;}
.sb-hd{padding:11px 14px 9px;border-bottom:1px solid var(--g2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.sb-hd h2{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--g5);}
.proj-item{padding:9px 12px 9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;position:relative;display:flex;flex-direction:column;gap:4px;}
.proj-item:hover{background:var(--g1);}
.proj-item.active{border-left-color:var(--or);background:rgba(255,107,0,.04);}
.pi-name{font-size:12px;font-weight:700;color:var(--bk);display:flex;align-items:center;gap:5px;}
.pi-stats{display:flex;gap:8px;}
.pis{font-size:10px;color:var(--g5);font-weight:600;}
.pis .v{font-weight:800;}.pis .v.or{color:var(--or);}.pis .v.gr{color:var(--green);}
.pi-find{position:absolute;right:8px;top:50%;transform:translateY(-50%);padding:3px 7px;border-radius:5px;border:1.5px solid var(--g2);background:#fff;font-size:10px;font-weight:700;color:var(--g5);cursor:pointer;transition:all .15s;opacity:0;white-space:nowrap;}
.proj-item:hover .pi-find{opacity:1;}
.pi-find:hover,.pi-find.loading{border-color:var(--or);color:var(--or);opacity:1;}
.add-proj{margin:8px 12px;padding:7px;border:1.5px dashed var(--g2);border-radius:6px;font-size:11px;font-weight:700;color:var(--g5);text-align:center;cursor:pointer;transition:all .15s;}
.add-proj:hover{border-color:var(--or);color:var(--or);}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#projHeader{padding:12px 16px 10px;border-bottom:1px solid var(--g2);background:#fff;flex-shrink:0;display:flex;align-items:center;gap:12px;}
.ph-info{flex:1;min-width:0;}
.ph-name{font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;line-height:1;}
.ph-sub{font-size:10px;color:var(--g5);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ph-stats{display:flex;gap:6px;}
.ph-stat{text-align:center;padding:5px 9px;background:var(--g1);border:1px solid var(--g2);border-radius:6px;min-width:44px;}
.ph-stat .sv{font-family:'Bebas Neue';font-size:17px;color:var(--bk);line-height:1;}
.ph-stat .sl{font-size:9px;color:var(--g5);font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.ph-stat.hi .sv{color:var(--or);}
.ph-stat.hi{border-color:rgba(255,107,0,.25);background:rgba(255,107,0,.04);}

/* progress */
.prog-wrap{padding:0 16px 10px;background:#fff;border-bottom:1px solid var(--g2);flex-shrink:0;}
.prog-bar{height:3px;background:var(--g2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--or),#ff9040);border-radius:2px;transition:width .4s;}
.prog-lbl{display:flex;justify-content:space-between;margin-top:3px;}
.prog-lbl span{font-size:10px;color:var(--g5);font-weight:600;}
.prog-lbl .pct{color:var(--or);font-weight:800;}

/* toolbar */
#toolbar{padding:8px 14px;border-bottom:1px solid var(--g2);background:#fff;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.sw{flex:1;position:relative;}
.sw input{width:100%;padding:6px 10px 6px 27px;border:1.5px solid var(--g2);border-radius:7px;font-family:'DM Sans';font-size:12px;background:var(--g1);color:var(--bk);transition:border-color .15s;}
.sw input:focus{outline:none;border-color:var(--or);background:#fff;}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--g5);}
.fcs{display:flex;gap:4px;}
.fc{padding:4px 9px;border-radius:100px;border:1.5px solid var(--g2);font-size:11px;font-weight:700;color:var(--g5);cursor:pointer;transition:all .15s;background:#fff;}
.fc.on{border-color:var(--or);color:var(--or);background:rgba(255,107,0,.05);}

/* TABLE */
#tableWrap{flex:1;overflow-y:auto;}
#tableWrap::-webkit-scrollbar{width:3px;}
#tableWrap::-webkit-scrollbar-thumb{background:var(--g2);}
table{width:100%;border-collapse:collapse;}
thead{position:sticky;top:0;z-index:10;background:#fff;box-shadow:0 1px 0 var(--g2);}
th{padding:7px 11px;text-align:left;font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--g5);text-transform:uppercase;white-space:nowrap;}
td{padding:8px 11px;border-bottom:1px solid var(--g2);font-size:12px;vertical-align:middle;}
tr:hover td{background:rgba(255,107,0,.02);}
.sb{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:700;}
.sb.pending{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;}
.sb.sent{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.sb.replied{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.sb.skipped{background:var(--g1);color:var(--g5);border:1px solid var(--g2);}
.sb.interested{background:#fefce8;color:#ca8a04;border:1px solid #fef08a;}
.sd{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;}
.ra-wrap{display:flex;gap:4px;opacity:0;transition:opacity .15s;}
tr:hover .ra-wrap{opacity:1;}
.ra{padding:3px 7px;border-radius:5px;border:1.5px solid var(--g2);background:#fff;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans';}
.ra:hover{border-color:var(--or);color:var(--or);}
.ra.send{background:var(--or);color:#fff;border-color:var(--or);}
.ra.send:hover{background:#e55f00;}
.mono{font-family:'DM Mono';font-size:10px;color:var(--g5);}
.score{font-family:'DM Mono';font-size:11px;font-weight:700;}
.score.hi{color:var(--green);}.score.md{color:var(--or);}.score.lo{color:var(--g3);}
.enrich-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;}
.enrich-badge.done{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.enrich-badge.raw{background:var(--g1);color:var(--g5);border:1px solid var(--g2);}
.snippet-cell{font-size:10px;color:var(--g5);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.empty-st{padding:50px 20px;text-align:center;color:var(--g5);}
.empty-st .ei{font-size:30px;margin-bottom:8px;}
.empty-st p{font-size:12px;line-height:1.6;}

/* RIGHT PANEL */
#panel{width:320px;flex-shrink:0;background:#fff;border-left:1px solid var(--g2);display:flex;flex-direction:column;overflow:hidden;transition:width .18s;}
#panel.hidden{width:0;overflow:hidden;}
.p-hd{padding:10px 14px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.p-hd h3{font-size:10px;letter-spacing:2px;color:var(--g5);text-transform:uppercase;font-weight:800;}
.p-tabs{display:flex;border-bottom:1px solid var(--g2);flex-shrink:0;}
.p-tab{flex:1;padding:8px 4px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--g5);border-bottom:2px solid transparent;transition:all .15s;}
.p-tab.on{color:var(--or);border-bottom-color:var(--or);}
.p-pane{display:none;flex:1;flex-direction:column;overflow:hidden;}
.p-pane.on{display:flex;}
.pbody{flex:1;overflow-y:auto;padding:13px;}
.pbody::-webkit-scrollbar{width:3px;}
.pbody::-webkit-scrollbar-thumb{background:var(--g2);}
.psec{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--g3);text-transform:uppercase;padding:6px 0 3px;}
.fld{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.fld label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--g5);text-transform:uppercase;}
.fld input,.fld textarea,.fld select{background:var(--g1);border:1.5px solid var(--g2);color:var(--bk);padding:6px 8px;border-radius:5px;font-family:'DM Sans';font-size:12px;line-height:1.45;transition:border-color .15s;width:100%;}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--or);background:#fff;}
.fld textarea{resize:vertical;}
.p-foot{padding:10px 13px;border-top:1px solid var(--g2);display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.pfb{width:100%;padding:8px;border-radius:6px;font-family:'DM Sans';font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;border:none;}
.pfb.primary{background:var(--or);color:#fff;}
.pfb.primary:hover{background:#e55f00;}
.pfb.secondary{background:var(--g1);color:var(--g7);border:1.5px solid var(--g2);}
.pfb.secondary:hover{border-color:var(--or);color:var(--or);}
.pfb:disabled{opacity:.35;cursor:not-allowed;}

/* email preview */
.eprev{background:var(--g1);border:1.5px solid var(--g2);border-radius:6px;overflow:hidden;margin-bottom:8px;}
.eprev-hd{padding:7px 10px;background:#fff;border-bottom:1px solid var(--g2);}
.eprev-subj{font-size:11px;font-weight:700;}
.eprev-meta{font-size:10px;color:var(--g5);margin-top:1px;font-family:'DM Mono';}
.eprev-body{padding:10px;font-size:11px;line-height:1.65;color:var(--g7);white-space:pre-wrap;max-height:200px;overflow-y:auto;}
.eprev-body::-webkit-scrollbar{width:3px;}

/* sent emails history */
.sent-empty{padding:20px;text-align:center;font-size:11px;color:var(--g5);}
.email-log-item{border-bottom:1px solid var(--g2);padding:10px 13px;cursor:pointer;transition:background .12s;}
.email-log-item:hover{background:var(--g1);}
.eli-date{font-size:10px;color:var(--g5);font-family:'DM Mono';}
.eli-subj{font-size:12px;font-weight:700;margin-top:2px;}
.eli-prev{font-size:10px;color:var(--g5);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.eli-expanded{background:var(--g1);padding:10px 13px;border-bottom:1px solid var(--g2);font-size:11px;line-height:1.65;color:var(--g7);white-space:pre-wrap;display:none;}
.eli-expanded.on{display:block;}

/* enrichment card */
.enrich-card{background:rgba(255,107,0,.04);border:1.5px solid rgba(255,107,0,.18);border-radius:6px;padding:9px 11px;font-size:11px;line-height:1.6;color:var(--g7);}
.enrich-card strong{color:var(--or);font-size:9px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;}
.enrich-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.etag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(255,107,0,.08);color:var(--or);border:1px solid rgba(255,107,0,.2);}
.etag.grey{background:var(--g1);color:var(--g5);border-color:var(--g2);}

/* SETTINGS PANEL */
#settingsPanel{width:272px;flex-shrink:0;background:#fff;border-left:1px solid var(--g2);display:flex;flex-direction:column;overflow:hidden;transition:width .18s;}
#settingsPanel.hidden{width:0;overflow:hidden;}
.sp-hd{padding:10px 14px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sp-hd h3{font-size:10px;letter-spacing:2px;color:var(--g5);text-transform:uppercase;font-weight:800;}
.sp-body{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:8px;}
.sp-body::-webkit-scrollbar{width:3px;}
.sp-body::-webkit-scrollbar-thumb{background:var(--g2);}
.sp-sec{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--g3);text-transform:uppercase;padding-top:4px;}
.sp-save{margin:10px 13px;padding:8px;border-radius:6px;background:var(--or);color:#fff;border:none;font-family:'DM Sans';font-size:12px;font-weight:700;cursor:pointer;width:calc(100% - 26px);}
.sp-save:hover{background:#e55f00;}

/* criteria pills */
.crit-wrap{display:flex;flex-wrap:wrap;gap:4px;}
.crit-pill{padding:3px 8px;border-radius:4px;border:1.5px solid var(--g2);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;background:#fff;color:var(--g7);}
.crit-pill.on{border-color:var(--or);background:rgba(255,107,0,.07);color:var(--or);}
.crit-pill.red.on{border-color:var(--red);background:rgba(239,68,68,.06);color:var(--red);}

/* API key area */
.api-key-row{display:flex;flex-direction:column;gap:3px;}
.api-key-row label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--g5);text-transform:uppercase;}
.api-key-row input{padding:6px 8px;border:1.5px solid var(--g2);border-radius:5px;font-family:'DM Mono';font-size:11px;background:var(--g1);color:var(--bk);width:100%;}
.api-key-row input:focus{outline:none;border-color:var(--or);}

/* MODAL */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.38);display:none;align-items:center;justify-content:center;z-index:9000;backdrop-filter:blur(3px);}
#ov.on{display:flex;}
.modal{background:#fff;border-radius:11px;width:420px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.mhd{padding:13px 16px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;}
.mhd h3{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;}
.mcl{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--g2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--g5);}
.mcl:hover{border-color:var(--or);color:var(--or);}
.mb{padding:14px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.mb::-webkit-scrollbar{width:3px;}
.mft{padding:11px 16px;border-top:1px solid var(--g2);display:flex;gap:7px;}
.mfb{flex:1;padding:8px;border-radius:6px;font-family:'DM Sans';font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.mfb.primary{background:var(--or);color:#fff;}
.mfb.primary:hover{background:#e55f00;}
.mfb.ghost{background:var(--g1);color:var(--g7);border:1.5px solid var(--g2);}
.cc{padding:3px 8px;border-radius:100px;border:1.5px solid var(--g2);font-size:10px;font-weight:700;color:var(--g7);cursor:pointer;transition:all .12s;background:#fff;}
.cc.sel{border-color:var(--or);background:rgba(255,107,0,.07);color:var(--or);}
.cat-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.ip{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;}
.ip-o{width:30px;height:30px;border-radius:5px;border:1.5px solid var(--g2);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}
.ip-o.sel{border-color:var(--or);background:rgba(255,107,0,.07);}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:8px 15px;border-radius:7px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:opacity .18s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;}
#toast.ok{border-left:3px solid var(--green);}
#toast.err{border-left:3px solid var(--red);}
#toast.info{border-left:3px solid var(--or);}

/* spinner */
.spin{display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:sp .7s linear infinite;flex-shrink:0;vertical-align:middle;}
.spin.dk{border-color:rgba(0,0,0,.1);border-top-color:var(--or);}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="tb">
  <div class="logo">meshminds3d</div>
  <span class="logo-sub">· Outreach Bot</span>
  <div class="tsep"></div>
  <span id="tbProj" style="font-size:12px;font-weight:700;color:var(--g7)">Select a project</span>
  <div class="sp"></div>
  <button class="xb ghost sm" onclick="openAddContact()">+ Contact</button>
  <button class="xb ghost sm" id="settingsBtn" onclick="toggleSettings()">⚙ Settings</button>
  <button class="xb sm" id="batchBtn" onclick="runBatch()">🚀 Send Batch</button>
</div>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-hd">
      <h2>Projects</h2>
    </div>
    <div id="projList"></div>
    <div class="add-proj" onclick="openAddProject()">+ New Project</div>
    <div style="flex:1"></div>
    <!-- API keys in sidebar bottom -->
    <div style="padding:10px 13px;border-top:1px solid var(--g2);display:flex;flex-direction:column;gap:6px;">
      <div class="api-key-row">
        <label>Anthropic API Key</label>
        <input type="password" id="anthropicKeyInput" placeholder="sk-ant-…" oninput="anthropicApiKey=this.value" onfocus="this.type='text'" onblur="this.type='password';localStorage.setItem('mm_anthropic',this.value)">
      </div>
      <div class="api-key-row">
        <label>SerpAPI Key</label>
        <input type="password" id="serpKeyInput" placeholder="sk-…" oninput="serpApiKey=this.value" onfocus="this.type='text'" onblur="this.type='password';localStorage.setItem('mm_serp',this.value)">
      </div>
      <div class="api-key-row">
        <label>Perplexity API Key</label>
        <input type="password" id="pplxKey" placeholder="pplx-…" oninput="pplxApiKey=this.value" onfocus="this.type='text'" onblur="this.type='password';localStorage.setItem('mm_pplx',this.value)">
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="projHeader">
      <div style="font-size:22px" id="phIcon">📋</div>
      <div class="ph-info">
        <div class="ph-name" id="phName">Select a project</div>
        <div class="ph-sub" id="phSub">Choose a project from the sidebar</div>
      </div>
      <div class="ph-stats" id="phStats"></div>
      <button class="xb sm" id="findBtn" onclick="findLeads()" disabled>🔍 +10 Leads</button>
    </div>

    <div class="prog-wrap" id="progWrap" style="display:none">
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-lbl"><span id="progL">0 sent</span><span class="pct" id="progPct">0%</span><span id="progR">0 total</span></div>
    </div>

    <div id="toolbar">
      <div class="sw"><span class="si">🔍</span><input id="searchInput" placeholder="Search contacts…" oninput="renderTable()"></div>
      <div class="fcs">
        <div class="fc on" id="fc-all"        onclick="setFilter('all')">All</div>
        <div class="fc"    id="fc-pending"    onclick="setFilter('pending')">Pending</div>
        <div class="fc"    id="fc-sent"       onclick="setFilter('sent')">Sent</div>
        <div class="fc"    id="fc-replied"    onclick="setFilter('replied')">Replied</div>
        <div class="fc"    id="fc-interested" onclick="setFilter('interested')">⭐</div>
      </div>
      <button class="xb ghost sm" onclick="loadContacts()">↻</button>
    </div>

    <div id="tableWrap">
      <table>
        <thead>
          <tr>
            <th style="width:24px"><input type="checkbox" onchange="toggleAll(this)"></th>
            <th>Brand</th>
            <th>Email</th>
            <th>Research</th>
            <th>Score</th>
            <th>Status</th>
            <th>Emails</th>
            <th>Last</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="9"><div class="empty-st"><div class="ei">👈</div><p>Select a project to begin</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- RIGHT: CONTACT PANEL (tabbed) -->
  <div id="panel" class="hidden">
    <div class="p-hd"><h3 id="panelTitle">Contact</h3><button class="mcl" onclick="closePanel()">✕</button></div>
    <div class="p-tabs">
      <button class="p-tab on" id="pt-info"  onclick="switchPTab('info')">Info</button>
      <button class="p-tab"    id="pt-emails" onclick="switchPTab('emails')">Sent Emails</button>
    </div>
    <!-- INFO PANE -->
    <div class="p-pane on" id="pp-info">
      <div class="pbody" id="panelBody"></div>
      <div class="p-foot" id="panelFooter"></div>
    </div>
    <!-- EMAILS PANE -->
    <div class="p-pane" id="pp-emails">
      <div id="emailLog" style="flex:1;overflow-y:auto;"></div>
    </div>
  </div>

  <!-- FAR RIGHT: PROJECT SETTINGS -->
  <div id="settingsPanel" class="hidden">
    <div class="sp-hd"><h3 id="spTitle">Settings</h3><button class="mcl" onclick="toggleSettings()">✕</button></div>
    <div class="sp-body" id="spBody"></div>
    <button class="sp-save" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<!-- MODAL -->
<div id="ov">
  <div class="modal">
    <div class="mhd"><h3 id="modalTitle">—</h3><button class="mcl" onclick="closeModal()">✕</button></div>
    <div class="mb" id="modalBody"></div>
    <div class="mft" id="modalFoot"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
const N8N = 'https://meshminds.app.n8n.cloud/webhook/outreach-bot';
let pplxApiKey = localStorage.getItem('mm_pplx') || '';
let anthropicApiKey = localStorage.getItem('mm_anthropic') || '';
let serpApiKey  = localStorage.getItem('mm_serp')  || '';

// ══════════════════════════════════════════════════
// DEFAULT PROJECTS
// ══════════════════════════════════════════════════
const DEFAULT_PROJECTS = [
  {
    id: 'filament-brands',
    name: 'Filament Brands',
    icon: '🎨',
    keywords: [
      'filament brand 3D printing EU',
      'PLA PETG filament manufacturer Europe',
      'Bambu Lab compatible filament brand',
      'filament hersteller Deutschland',
      '3D printing filament sponsor creator'
    ],
    location: 'Europe',
    criteria: {
      companySize: ['small','medium'],
      businessType: ['brand','manufacturer'],
      collab: true,
      shipsTo: 'Europe',
      hasSocial: true,
      avoidKeywords: ['alibaba','dropship','wholesale only','no retail'],
      language: ['en','de'],
    },
    emailBrief: "Hi, I'm Daniel — I run @meshminds3d on Instagram and TikTok with 85K followers focused entirely on making money with 3D printing. I print daily on a Bambu Lab A1 and my audience is highly engaged and purchase-driven.\n\nI'm reaching out because I think your filament would be a great fit for a collaboration — whether that's an honest review reel, a sponsored carousel, or a longer-term partnership. My viewers trust my material recommendations and actively buy based on what I test.\n\nHappy to share my media kit if useful.",
    maxLeads: 10,
    minScore: 6
  }
];

let projects = JSON.parse(localStorage.getItem('mm_projects') || 'null') || DEFAULT_PROJECTS;
let contacts  = {};   // projectId → array of contact objects
let emailLogs = {};   // contactEmail → array of {date, subject, body}
let currentPid   = null;
let currentFilter = 'all';
let _panelIdx    = null;
let _panelTab    = 'info';

function saveProjects() { localStorage.setItem('mm_projects', JSON.stringify(projects)); }
function getProj(id)   { return projects.find(p => p.id === id); }
function curProj()     { return getProj(currentPid); }
function curContacts() { return contacts[currentPid] || []; }

// ══════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════
function renderSidebar() {
  document.getElementById('projList').innerHTML = projects.map(p => {
    const cs = contacts[p.id] || [];
    const sent = cs.filter(c => ['Sent','Replied','Interested'].includes(c.Status)).length;
    const pending = cs.filter(c => c.Status === 'Pending').length;
    return `<div class="proj-item${p.id===currentPid?' active':''}" onclick="selectProject('${p.id}')">
      <div class="pi-name"><span>${p.icon}</span>${p.name}</div>
      <div class="pi-stats">
        <div class="pis"><span class="v">${cs.length}</span> total</div>
        <div class="pis"><span class="v or">${pending}</span> pending</div>
        <div class="pis"><span class="v gr">${sent}</span> sent</div>
      </div>
      <button class="pi-find" id="pif-${p.id}" onclick="event.stopPropagation();quickFind('${p.id}')" title="Find 10 new leads">+10</button>
    </div>`;
  }).join('');
  // restore API key inputs
  document.getElementById('pplxKey').value = pplxApiKey;
  document.getElementById('serpKeyInput').value = serpApiKey;
  const ak = document.getElementById('anthropicKeyInput'); if(ak) ak.value = anthropicApiKey;
}

// ══════════════════════════════════════════════════
// SELECT PROJECT
// ══════════════════════════════════════════════════
async function selectProject(id) {
  currentPid = id;
  const p = getProj(id);
  document.getElementById('tbProj').textContent = p.name;
  document.getElementById('phIcon').textContent = p.icon;
  document.getElementById('phName').textContent = p.name;
  document.getElementById('phSub').textContent = p.keywords.slice(0,2).join(' · ');
  document.getElementById('findBtn').disabled = false;
  setFilter('all', false);
  renderSidebar();
  await loadContacts();
}

// ══════════════════════════════════════════════════
// LOAD CONTACTS
// ══════════════════════════════════════════════════
async function loadContacts() {
  if (!currentPid) return;
  try {
    const data = await api({ action:'get_contacts', projectId: currentPid });
    contacts[currentPid] = (data.contacts||[]).map((c,i)=>({_row:i+2,...c,Status:c.Status||'Pending','Emails Sent':c['Emails Sent']||'0'}));
    // restore email logs from contacts if stored in sheet
    contacts[currentPid].forEach(c => {
      if (c._emailLog) {
        try { emailLogs[c.Email] = JSON.parse(c._emailLog); } catch(e){}
      }
    });
  } catch(e) {
    contacts[currentPid] = []; // load from sheet only
  }
  renderHeader();
  renderTable();
  renderSidebar();
}

function getDemoContacts() { return []; }

// ══════════════════════════════════════════════════
// HEADER STATS
// ══════════════════════════════════════════════════
function renderHeader() {
  const cs = curContacts();
  const total = cs.length, sent = cs.filter(c=>['Sent','Replied','Interested'].includes(c.Status)).length;
  const replied = cs.filter(c=>['Replied','Interested'].includes(c.Status)).length;
  const pending = cs.filter(c=>c.Status==='Pending').length;
  const pct = total ? Math.round(sent/total*100) : 0;
  document.getElementById('phStats').innerHTML = `
    <div class="ph-stat hi"><div class="sv">${pending}</div><div class="sl">Pending</div></div>
    <div class="ph-stat"><div class="sv">${sent}</div><div class="sl">Sent</div></div>
    <div class="ph-stat"><div class="sv">${replied}</div><div class="sl">Replied</div></div>
    <div class="ph-stat"><div class="sv">${total}</div><div class="sl">Total</div></div>`;
  const pw = document.getElementById('progWrap');
  if (total) {
    pw.style.display = 'block';
    document.getElementById('progFill').style.width = pct+'%';
    document.getElementById('progL').textContent = sent+' sent';
    document.getElementById('progPct').textContent = pct+'%';
    document.getElementById('progR').textContent = total+' total';
  } else { pw.style.display = 'none'; }
}

// ══════════════════════════════════════════════════
// TABLE
// ══════════════════════════════════════════════════
function setFilter(f, redraw=true) {
  currentFilter = f;
  ['all','pending','sent','replied','interested'].forEach(k =>
    document.getElementById('fc-'+k)?.classList.toggle('on', k===f));
  if (redraw) renderTable();
}

function renderTable() {
  const cs = curContacts();
  const q = document.getElementById('searchInput').value.toLowerCase();
  const rows = cs.filter(c => {
    const mf = currentFilter==='all' || (c.Status||'').toLowerCase()===currentFilter;
    const ms = !q || [c.Brand,c.Name,c.Email,c.EnrichSummary,c.EnrichTags].some(v=>(v||'').toLowerCase().includes(q));
    return mf && ms;
  });

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-st"><div class="ei">${currentPid?'📭':'👈'}</div><p>${currentPid?'No contacts yet. Hit 🔍 +10 Leads to find some.':'Select a project.'}</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(c => {
    const idx = curContacts().indexOf(c);
    const sc = parseInt(c.Score||0);
    const scCls = sc>=8?'hi':sc>=5?'md':'lo';
    const enrichBadge = c.Enriched
      ? `<span class="enrich-badge done">✓ researched</span>`
      : `<span class="enrich-badge raw">snippet</span>`;
    const emailCount = parseInt(c['Emails Sent']||0);
    const hasEmails = emailCount > 0;
    return `<tr onclick="openContact(${idx})" style="cursor:pointer">
      <td onclick="event.stopPropagation()"><input type="checkbox"></td>
      <td><strong>${c.Brand||'—'}</strong><div class="mono" style="margin-top:1px">${c.Name||''}</div></td>
      <td class="mono">${c.Email||'—'}</td>
      <td>${enrichBadge}<div class="snippet-cell" style="margin-top:2px" title="${esc(c.EnrichSummary||c.Snippet||'')}">${c.EnrichSummary||c.Snippet||'—'}</div></td>
      <td><span class="score ${scCls}">${c.Score||'—'}</span></td>
      <td>${badge(c.Status)}</td>
      <td style="text-align:center">
        ${hasEmails ? `<span style="cursor:pointer;color:var(--or);font-weight:700;font-size:11px;" onclick="event.stopPropagation();openContact(${idx},true)">${emailCount} ✉</span>` : `<span style="color:var(--g3);font-size:11px">0</span>`}
      </td>
      <td class="mono">${c['Last Contact']||'—'}</td>
      <td onclick="event.stopPropagation()">
        <div class="ra-wrap">
          <button class="ra send" onclick="sendSingle(${idx})">Send</button>
          <button class="ra" onclick="openContact(${idx})">View</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function badge(s) {
  const m={Pending:'pending',Sent:'sent',Replied:'replied',Interested:'interested',Skipped:'skipped'};
  return `<span class="sb ${m[s]||'pending'}"><span class="sd"></span>${s||'Pending'}</span>`;
}
function toggleAll(cb) { document.querySelectorAll('#tbody input[type=checkbox]').forEach(e=>e.checked=cb.checked); }
function esc(v) { return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════════
// CONTACT PANEL — tabbed: Info / Sent Emails
// ══════════════════════════════════════════════════
function switchPTab(tab) {
  _panelTab = tab;
  ['info','emails'].forEach(t => {
    document.getElementById('pt-'+t).classList.toggle('on', t===tab);
    document.getElementById('pp-'+t).classList.toggle('on', t===tab);
  });
  if (tab === 'emails' && _panelIdx !== null) renderEmailLog(_panelIdx);
}

function openContact(idx, goEmails=false) {
  _panelIdx = idx;
  const c = curContacts()[idx];
  closeSettings();
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('panelTitle').textContent = c.Brand || c.Name;

  // Info pane
  document.getElementById('panelBody').innerHTML = `
    <div class="psec">Contact</div>
    <div class="fld"><label>Brand</label><input value="${esc(c.Brand)}" oninput="curContacts()[${idx}].Brand=this.value"></div>
    <div class="fld"><label>Name</label><input value="${esc(c.Name)}" oninput="curContacts()[${idx}].Name=this.value"></div>
    <div class="fld"><label>Email</label><input type="email" value="${esc(c.Email)}" oninput="curContacts()[${idx}].Email=this.value"></div>
    <div class="fld"><label>Status</label>
      <select onchange="curContacts()[${idx}].Status=this.value;renderTable();renderHeader();renderSidebar()">
        ${['Pending','Sent','Replied','Interested','Skipped'].map(s=>`<option ${c.Status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    ${c.Enriched ? `
    <div class="psec">Perplexity Research</div>
    <div class="enrich-card">
      <strong>AI research summary</strong>
      ${c.EnrichSummary||''}
      ${c.EnrichTags ? `<div class="enrich-tags">${c.EnrichTags.split(',').map(t=>`<span class="etag">${t.trim()}</span>`).join('')}</div>` : ''}
    </div>` : `
    <div class="psec">Context</div>
    <div style="font-size:11px;color:var(--g5);line-height:1.6">No Perplexity research yet. Research will run automatically when leads are found with a Perplexity API key set.</div>`}
    <div class="psec">Notes</div>
    <div class="fld"><textarea rows="2" oninput="curContacts()[${idx}].Notes=this.value">${esc(c.Notes||'')}</textarea></div>
  `;
  document.getElementById('panelFooter').innerHTML = `
    <button class="pfb primary" id="pSendBtn" onclick="sendSingle(${idx})">✉️ Generate Personalised Email</button>
    <button class="pfb secondary" onclick="saveContact(${idx})">Save</button>
  `;

  switchPTab(goEmails ? 'emails' : 'info');
}

function closePanel() { document.getElementById('panel').classList.add('hidden'); _panelIdx = null; }

async function saveContact(idx) {
  const c = curContacts()[idx];
  try {
    await api({ action:'update_status', projectId:currentPid, row:c._row, ...c });
    toast('Saved','ok'); renderTable(); renderHeader(); renderSidebar();
  } catch(e) { toast('Save failed','err'); }
}

// ══════════════════════════════════════════════════
// SENT EMAIL LOG
// ══════════════════════════════════════════════════
function renderEmailLog(idx) {
  const c = curContacts()[idx];
  const logs = emailLogs[c.Email] || [];
  const el = document.getElementById('emailLog');
  if (!logs.length) {
    el.innerHTML = `<div class="sent-empty">No emails sent yet.<br>Hit "Generate Personalised Email" to start.</div>`;
    return;
  }
  el.innerHTML = logs.slice().reverse().map((log, i) => `
    <div class="email-log-item" onclick="toggleEmailExpand(${i})">
      <div class="eli-date">${log.date}</div>
      <div class="eli-subj">${log.subject}</div>
      <div class="eli-prev">${log.body.slice(0,80)}…</div>
    </div>
    <div class="eli-expanded" id="elog-${i}">${log.body}</div>
  `).join('');
}

function toggleEmailExpand(i) {
  const el = document.getElementById('elog-'+i);
  if (el) el.classList.toggle('on');
}

// ══════════════════════════════════════════════════
// SEND EMAIL
// ══════════════════════════════════════════════════
async function sendSingle(idx) {
  const c = curContacts()[idx];
  const p = curProj();
  _panelIdx = idx;
  if (document.getElementById('panel').classList.contains('hidden')) openContact(idx);
  switchPTab('info');
  const btn = document.getElementById('pSendBtn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin"></span> Writing…'; }
  toast('Writing personalised email with Claude…','info');

  try {
    const data = await api({
      action:'send_outreach', projectId:currentPid,
      contact:{ name:c.Name, brand:c.Brand, email:c.Email, category:c.Category||'',
                enrichSummary:c.EnrichSummary||c.Snippet||'', enrichTags:c.EnrichTags||'' },
      emailBrief: p?.emailBrief || ''
    });
    if (!data.success) throw new Error(data.error||'Failed');

    // Show preview
    const body = document.getElementById('panelBody');
    document.querySelector('.eprev')?.remove();
    const prev = document.createElement('div');
    prev.className = 'eprev';
    prev.innerHTML = `
      <div class="eprev-hd"><div class="eprev-subj">${data.subject}</div><div class="eprev-meta">To: ${c.Email}</div></div>
      <div class="eprev-body">${data.body}</div>`;
    body.insertBefore(prev, body.firstChild);

    const enc = encodeURIComponent(JSON.stringify({subject:data.subject,body:data.body}));
    document.getElementById('panelFooter').innerHTML = `
      <button class="pfb primary" onclick="confirmSend(${idx},'${enc}')">📤 Confirm & Send</button>
      <button class="pfb secondary" onclick="sendSingle(${idx})">↻ Regenerate</button>`;
    toast('Preview ready — confirm to send','ok');
  } catch(e) {
    toast('Error: '+e.message,'err');
    if(btn){btn.disabled=false;btn.innerHTML='✉️ Generate Personalised Email';}
  }
}

async function confirmSend(idx, enc) {
  const c = curContacts()[idx];
  const parsed = JSON.parse(decodeURIComponent(enc));
  document.getElementById('panelFooter').innerHTML = `<div style="padding:8px;text-align:center;font-size:12px;color:var(--g5);display:flex;align-items:center;justify-content:center;gap:6px"><span class="spin dk"></span>Sending…</div>`;
  try {
    const d = today();
    await api({ action:'update_status', projectId:currentPid, row:c._row, Status:'Sent', 'Last Contact':d, 'Emails Sent':String(parseInt(c['Emails Sent']||0)+1) });
    // Store in local email log
    if (!emailLogs[c.Email]) emailLogs[c.Email] = [];
    emailLogs[c.Email].push({ date:d, subject:parsed.subject, body:parsed.body });
    c.Status='Sent'; c['Last Contact']=d; c['Emails Sent']=String(parseInt(c['Emails Sent']||0)+1);
    renderTable(); renderHeader(); renderSidebar();
    toast(`✅ Sent to ${c.Email}`,'ok');
    document.getElementById('panelFooter').innerHTML=`
      <button class="pfb secondary" style="color:var(--green);border-color:var(--green);" disabled>✓ Sent!</button>
      <button class="pfb secondary" onclick="switchPTab('emails')">View Sent Emails →</button>`;
  } catch(e) { toast('Send failed','err'); }
}

function today() { return new Date().toISOString().split('T')[0]; }

// ══════════════════════════════════════════════════
// BATCH
// ══════════════════════════════════════════════════
async function runBatch() {
  const p = curProj();
  if (!p) { toast('Select a project first','err'); return; }
  if (!curContacts().filter(c=>c.Status==='Pending').length) { toast('No pending contacts','info'); return; }
  const btn = document.getElementById('batchBtn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Running…';
  toast('Sending batch…','info');
  try {
    const data = await api({ action:'run_batch', projectId:currentPid, emailBrief:p.emailBrief, anthropicKey:anthropicApiKey||undefined });
    toast(`✅ ${data.sent||0} emails sent`,'ok');
    await loadContacts();
  } catch(e) { toast('Batch failed: '+e.message,'err'); }
  btn.disabled=false; btn.innerHTML='🚀 Send Batch';
}

// ══════════════════════════════════════════════════
// FIND LEADS — one click
// ══════════════════════════════════════════════════
async function findLeads() {
  if (!currentPid) return;
  const btn = document.getElementById('findBtn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Finding…';
  toast(`Searching + researching leads for ${curProj().name}…`,'info');
  await _findLeads(currentPid);
  btn.disabled=false; btn.innerHTML='🔍 +10 Leads';
}

async function quickFind(pid) {
  const btn = document.getElementById('pif-'+pid);
  if(btn){btn.classList.add('loading');btn.innerHTML='<span class="spin dk"></span>';}
  await _findLeads(pid);
  if(btn){btn.classList.remove('loading');btn.innerHTML='+10';}
}

async function _findLeads(pid) {
  const p = getProj(pid);
  try {
    const data = await api({
      action:'find_leads', projectId:pid,
      keywords:p.keywords, location:p.location,
      criteria:p.criteria,
      maxResults:p.maxLeads||10, minScore:p.minScore||5,
      serpKey:serpApiKey||undefined, pplxKey:pplxApiKey||undefined,
      usePplx: !!pplxApiKey
    });
    const count = data.count||0;
    toast(`✅ ${count} new leads added${pplxApiKey?' + researched with Perplexity':''}`, 'ok');
    if (pid===currentPid) await loadContacts();
    else {
      try {
        const d2 = await api({action:'get_contacts',projectId:pid});
        contacts[pid]=(d2.contacts||[]).map((c,i)=>({_row:i+2,...c,Status:c.Status||'Pending','Emails Sent':c['Emails Sent']||'0'}));
      } catch(e){}
      renderSidebar();
    }
  } catch(e) { toast('Find failed: '+e.message,'err'); }
}

// ══════════════════════════════════════════════════
// PROJECT SETTINGS — criteria + template + keywords
// ══════════════════════════════════════════════════
function toggleSettings() {
  const sp = document.getElementById('settingsPanel');
  if (sp.classList.contains('hidden')) openSettings();
  else closeSettings();
}

function openSettings() {
  const p = curProj();
  if (!p) { toast('Select a project first','info'); return; }
  closePanel();
  document.getElementById('settingsPanel').classList.remove('hidden');
  document.getElementById('spTitle').textContent = p.name+' Settings';

  const cr = p.criteria || {};
  const sizes  = ['small','medium','large','enterprise'];
  const types  = ['brand','manufacturer','reseller','shop','software','agency','marketplace'];
  const langs  = ['en','de','fr','nl','es','it','pl'];

  document.getElementById('spBody').innerHTML = `
    <div class="fld"><label>Project Name</label><input id="sp-name" value="${esc(p.name)}"></div>
    <div class="fld"><label>Icon</label>
      <div class="ip" id="sp-ip">
        ${['🎨','🔩','🔧','🖨️','📦','🛒','💡','⚡','🎯','🚀','🌍','🧲'].map(ic=>
          `<div class="ip-o${p.icon===ic?' sel':''}" onclick="pickIcon(this,'${ic}')">${ic}</div>`).join('')}
        <input type="hidden" id="sp-icon" value="${p.icon}">
      </div>
    </div>

    <div class="sp-sec">Lead Criteria</div>

    <div class="fld"><label>Company Size</label>
      <div class="crit-wrap">${sizes.map(s=>`<div class="crit-pill${(cr.companySize||[]).includes(s)?' on':''}" onclick="toggleCrit(this,'companySize','${s}')">${s}</div>`).join('')}</div>
      <div style="font-size:10px;color:var(--g5);margin-top:3px">What size companies should we target?</div>
    </div>

    <div class="fld"><label>Business Type</label>
      <div class="crit-wrap">${types.map(t=>`<div class="crit-pill${(cr.businessType||[]).includes(t)?' on':''}" onclick="toggleCrit(this,'businessType','${t}')">${t}</div>`).join('')}</div>
    </div>

    <div class="fld"><label>Ships To / Region</label>
      <input id="sp-ships" value="${esc(cr.shipsTo||'Europe')}" placeholder="e.g. Europe, Germany, Global">
    </div>

    <div class="fld"><label>Must have Instagram / social</label>
      <div class="crit-wrap">
        <div class="crit-pill${cr.hasSocial?' on':''}" id="crit-social-yes" onclick="setCritBool('hasSocial',true,this)">Yes</div>
        <div class="crit-pill${!cr.hasSocial?' on':''}" id="crit-social-no" onclick="setCritBool('hasSocial',false,this)">No preference</div>
      </div>
    </div>

    <div class="fld"><label>Does creator collabs</label>
      <div class="crit-wrap">
        <div class="crit-pill${cr.collab?' on':''}" id="crit-collab-yes" onclick="setCritBool('collab',true,this)">Yes — filter for it</div>
        <div class="crit-pill${!cr.collab?' on':''}" id="crit-collab-no" onclick="setCritBool('collab',false,this)">No preference</div>
      </div>
    </div>

    <div class="fld"><label>Website Language</label>
      <div class="crit-wrap">${langs.map(l=>`<div class="crit-pill${(cr.language||[]).includes(l)?' on':''}" onclick="toggleCrit(this,'language','${l}')">${l.toUpperCase()}</div>`).join('')}</div>
    </div>

    <div class="fld"><label>Exclude if snippet contains</label>
      <input id="sp-avoid" value="${esc((cr.avoidKeywords||[]).join(', '))}" placeholder="e.g. alibaba, dropship, wholesale only">
      <div style="font-size:10px;color:var(--g5);margin-top:2px">Comma-separated words. Leads matching these are dropped.</div>
    </div>

    <div class="sp-sec">Lead Search</div>
    <div class="fld"><label>Keywords (one per line)</label>
      <textarea id="sp-kw" rows="4">${(p.keywords||[]).join('\n')}</textarea>
    </div>
    <div class="fld"><label>Location / Region</label>
      <input id="sp-loc" value="${esc(p.location||'Europe')}">
    </div>
    <div class="fld"><label>Max leads per run</label>
      <select id="sp-max">${[5,10,20,50].map(n=>`<option value="${n}"${p.maxLeads===n?' selected':''}>${n}</option>`).join('')}</select>
    </div>
    <div class="fld"><label>Min relevance score (1–10)</label>
      <input id="sp-score" type="number" min="1" max="10" value="${p.minScore||5}">
    </div>

    <div class="sp-sec">Email Template</div>
    <div class="fld"><label>Your pitch brief</label>
      <textarea id="sp-brief" rows="6">${esc(p.emailBrief||'')}</textarea>
    </div>
  `;
}

// criteria toggle helpers — operate on temp DOM state read at save time
const _critState = {}; // projectId → criteria object (live edit)
function ensureCritState() {
  const p = curProj(); if(!p) return;
  if (!_critState[p.id]) _critState[p.id] = JSON.parse(JSON.stringify(p.criteria||{}));
}

function toggleCrit(el, field, val) {
  ensureCritState(); const p = curProj();
  let arr = _critState[p.id][field] = _critState[p.id][field] || [];
  if (arr.includes(val)) { arr.splice(arr.indexOf(val),1); el.classList.remove('on'); }
  else { arr.push(val); el.classList.add('on'); }
}

function setCritBool(field, val, el) {
  ensureCritState(); const p = curProj();
  _critState[p.id][field] = val;
  // toggle sibling pills
  el.closest('.crit-wrap').querySelectorAll('.crit-pill').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}

function pickIcon(el, ic) {
  document.querySelectorAll('#sp-ip .ip-o').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel'); document.getElementById('sp-icon').value=ic;
}

function saveSettings() {
  const p = curProj(); if(!p) return;
  p.name = document.getElementById('sp-name').value.trim() || p.name;
  p.icon = document.getElementById('sp-icon').value;
  p.keywords = document.getElementById('sp-kw').value.split('\n').map(s=>s.trim()).filter(Boolean);
  p.location = document.getElementById('sp-loc').value.trim();
  p.maxLeads = parseInt(document.getElementById('sp-max').value)||10;
  p.minScore = parseInt(document.getElementById('sp-score').value)||5;
  p.emailBrief = document.getElementById('sp-brief').value.trim();
  // merge criteria from live state + form fields
  const cr = _critState[p.id] || p.criteria || {};
  cr.shipsTo = document.getElementById('sp-ships').value.trim();
  cr.avoidKeywords = document.getElementById('sp-avoid').value.split(',').map(s=>s.trim()).filter(Boolean);
  p.criteria = cr;
  saveProjects();
  document.getElementById('phName').textContent = p.name;
  document.getElementById('phIcon').textContent = p.icon;
  document.getElementById('tbProj').textContent = p.name;
  renderSidebar();
  toast('Settings saved','ok');
}

function closeSettings() { document.getElementById('settingsPanel').classList.add('hidden'); }

// ADD PROJECT MODAL
// ══════════════════════════════════════════════════
let _newIcon = '📋';
function openAddProject() {
  _newIcon = '📋';
  document.getElementById('modalTitle').textContent = 'New Project';
  document.getElementById('modalBody').innerHTML = `
    <div class="fld"><label>Project Name *</label><input id="np-name" placeholder="e.g. Filament Brands DE"></div>
    <div class="fld"><label>Icon</label>
      <div class="ip">
        ${['🎨','🔩','🔧','🖨️','📦','🛒','💡','⚡','🎯','🚀','🌍','🧲'].map((ic,i)=>
          `<div class="ip-o${i===0?' sel':''}" onclick="pickModalIcon(this,'${ic}')">${ic}</div>`).join('')}
      </div>
    </div>
    <div class="fld"><label>Keywords (one per line)</label><textarea id="np-kw" rows="3" placeholder="filament brand Germany\nPLA PETG manufacturer EU"></textarea></div>
    <div class="fld"><label>Location</label><input id="np-loc" value="Europe"></div>
    <div class="fld"><label>Email Brief</label><textarea id="np-brief" rows="3" placeholder="Describe your pitch angle for this project…"></textarea></div>
  `;
  document.getElementById('modalFoot').innerHTML = `
    <button class="mfb ghost" onclick="closeModal()">Cancel</button>
    <button class="mfb primary" onclick="addProject()">Create</button>`;
  document.getElementById('ov').classList.add('on');
}

function pickModalIcon(el, ic) {
  document.querySelectorAll('#ov .ip-o').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel'); _newIcon=ic;
}

function addProject() {
  const name = document.getElementById('np-name').value.trim();
  if (!name) { toast('Name required','err'); return; }
  const id = name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();
  projects.push({ id, name, icon:_newIcon,
    keywords: document.getElementById('np-kw').value.split('\n').map(s=>s.trim()).filter(Boolean),
    location: document.getElementById('np-loc').value.trim()||'Europe',
    criteria:{ companySize:['small','medium'], businessType:['brand'], collab:false, shipsTo:'Europe', hasSocial:false, avoidKeywords:[], language:['en'] },
    emailBrief: document.getElementById('np-brief').value.trim(),
    maxLeads:10, minScore:5
  });
  saveProjects(); contacts[id]=[]; renderSidebar(); closeModal();
  selectProject(id); toast(`"${name}" created`,'ok');
}

// ADD CONTACT MODAL
// ══════════════════════════════════════════════════
let _addCat = 'Brand';
function openAddContact() {
  if (!currentPid) { toast('Select a project first','info'); return; }
  document.getElementById('modalTitle').textContent = 'Add Contact';
  document.getElementById('modalBody').innerHTML = `
    <div class="fld"><label>Brand *</label><input id="ac-brand" placeholder="e.g. eSUN"></div>
    <div class="fld"><label>Name</label><input id="ac-name" placeholder="Marketing Team"></div>
    <div class="fld"><label>Email *</label><input type="email" id="ac-email" placeholder="contact@brand.com"></div>
    <div class="fld"><label>Category</label>
      <div class="cat-chips">
        ${['Brand','Shop','Software','Reseller','Other'].map((c,i)=>
          `<div class="cc${i===0?' sel':''}" onclick="setAddCat(this,'${c}')">${c}</div>`).join('')}
      </div>
    </div>
    <div class="fld"><label>Context / snippet</label><textarea id="ac-snip" rows="2" placeholder="Paste a sentence from their website — Claude uses this to personalise the email"></textarea></div>
  `;
  document.getElementById('modalFoot').innerHTML = `
    <button class="mfb ghost" onclick="closeModal()">Cancel</button>
    <button class="mfb primary" id="acBtn" onclick="addContact()">Add Contact</button>`;
  document.getElementById('ov').classList.add('on');
  setTimeout(()=>document.getElementById('ac-brand').focus(),50);
}

function setAddCat(el,cat) { document.querySelectorAll('#ov .cc').forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); _addCat=cat; }

async function addContact() {
  const brand=document.getElementById('ac-brand').value.trim(), email=document.getElementById('ac-email').value.trim();
  if (!brand||!email){toast('Brand + Email required','err');return;}
  const btn=document.getElementById('acBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try {
    await api({action:'add_contact',projectId:currentPid,brand,name:document.getElementById('ac-name').value.trim(),email,category:_addCat,snippet:document.getElementById('ac-snip').value.trim()});
    toast('Added!','ok');closeModal();await loadContacts();
  } catch(e){toast('Failed','err');}
  btn.disabled=false;btn.textContent='Add Contact';
}

function closeModal() { document.getElementById('ov').classList.remove('on'); }

// ══════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════
async function api(payload) {
  const res = await fetch(N8N,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),keepalive:true});
  if (!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

// ══════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════
let _tt;
function toast(msg,type){const el=document.getElementById('toast');el.className='on '+(type||'info');el.textContent=(type==='ok'?'✓ ':type==='err'?'✕ ':'')+msg;clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),3000);}

// ══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closePanel();closeSettings();}});
document.getElementById('ov').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
pplxApiKey = localStorage.getItem('mm_pplx')||'';
serpApiKey  = localStorage.getItem('mm_serp')||'';
anthropicApiKey = localStorage.getItem('mm_anthropic')||'';
renderSidebar();
if(projects.length) selectProject(projects[0].id);
</script>
